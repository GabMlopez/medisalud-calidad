name: Medicion Calidad en Uso - MediSalud

on:
  schedule:
    - cron: "0 6 * * 1" # Se ejecuta automáticamente todos los lunes a las 06:00 UTC
  workflow_dispatch: {} # Habilita ejecución manual desde la web de GitHub

jobs:
  calcular-metricas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Ejecutar script de calculo de metricas
        run: python scripts/metricas_iso25022.py

      - name: Exportar reporte JSON para dashboards
        run: python scripts/exportar_reporte.py

      - name: Guardar indicadores como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: indicadores-calidad-uso
          path: dashboards/indicadores.json